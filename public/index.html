<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk & Cut Tracker</title>
<style>
  :root{
    --bg:#12151A;
    --card:#1B2028;
    --card-2:#20262F;
    --card-3:#262D37;
    --line:#2B323C;
    --text:#F1EFE9;
    --text-dim:#9AA0A8;
    --text-faint:#666D77;
    --daniel:#E8A33D;
    --daniel-dim:#3A2E19;
    --ire:#33B7A6;
    --ire-dim:#15302C;
    --good:#6FBF73;
    --warn:#E8734A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    padding-bottom:60px;
  }
  h1,h2,h3{font-family:'Oswald',system-ui,sans-serif;font-weight:600;letter-spacing:0.02em;margin:0;}
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 40px;}
  header{padding:24px 0 12px;text-align:center;}
  header h1{font-size:24px;text-transform:uppercase;}
  header p{color:var(--text-dim);font-size:13px;margin-top:4px;}

  .tabs{display:flex;gap:10px;margin:20px 0;}
  .tab{
    flex:1;padding:14px 10px;border-radius:var(--radius);border:1.5px solid var(--line);
    background:var(--card);text-align:center;cursor:pointer;transition:all .15s;
  }
  .tab .name{font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;}
  .tab .role{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .tab.active.daniel{border-color:var(--daniel);background:var(--daniel-dim);}
  .tab.active.daniel .name{color:var(--daniel);}
  .tab.active.ire{border-color:var(--ire);background:var(--ire-dim);}
  .tab.active.ire .name{color:var(--ire);}

  .accent-bar{height:3px;border-radius:3px;margin-bottom:18px;}
  .accent-bar.daniel{background:var(--daniel);}
  .accent-bar.ire{background:var(--ire);}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;margin-bottom:16px;
  }
  .card h2{font-size:14px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;letter-spacing:0.06em;}
  .day-label{font-size:19px;margin-bottom:2px;}
  .day-sub{font-size:12px;color:var(--text-dim);margin-bottom:14px;}

  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .row:last-child{border-bottom:none;}
  .row .meta{color:var(--text-faint);font-size:12px;}
  .check{
    width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    background:var(--card-2);
  }
  .check.on{background:var(--good);border-color:var(--good);}
  .check.on::after{content:'✓';color:#0f1a10;font-size:14px;font-weight:bold;}
  .item-text{flex:1;}

  .sub-heading{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 4px;padding-top:10px;border-top:1px solid var(--line);}
  .sub-heading:first-child{margin-top:0;padding-top:0;border-top:none;}

  label.field-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
  input[type=number], input[type=date], input[type=text], textarea, select{
    width:100%;background:var(--card-2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;
  }
  textarea{resize:vertical;min-height:60px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

  .save-btn{
    width:100%;padding:14px;border-radius:12px;border:none;
    font-family:'Oswald',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:0.05em;
    cursor:pointer;margin-top:6px;color:#12151A;
  }
  .save-btn.daniel{background:var(--daniel);}
  .save-btn.ire{background:var(--ire);}
  .save-btn:active{transform:scale(0.98);}
  .status-msg{text-align:center;font-size:12px;color:var(--good);margin-top:8px;height:14px;}

  .progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .progress-track{flex:1;height:8px;background:var(--card-2);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;}
  .progress-fill.daniel{background:var(--daniel);}
  .progress-fill.ire{background:var(--ire);}
  .progress-pct{font-size:12px;color:var(--text-dim);min-width:34px;text-align:right;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-faint);font-weight:400;font-size:11px;text-transform:uppercase;padding:6px 4px;border-bottom:1px solid var(--line);}
  td{padding:8px 4px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .empty-state{color:var(--text-faint);font-size:13px;text-align:center;padding:20px 0;}

  canvas{width:100%;height:120px;display:block;}
  .meal-note{font-size:11px;color:var(--text-faint);margin-top:10px;line-height:1.5;}
  .meal-group-label{font-size:12px;font-weight:600;color:var(--ire);text-transform:uppercase;letter-spacing:0.05em;margin-top:14px;padding-top:10px;border-top:1px solid var(--line);}
  .meal-group-label:first-child{margin-top:0;padding-top:0;border-top:none;}
  .meal-group-total{font-size:11px;color:var(--text-faint);padding:2px 0 4px 32px;font-style:italic;}

  /* ---- Meal tracker (Daniel) ---- */
  .food-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .food-tab{
    padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card-2);
    font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap;
  }
  .food-tab.active{border-color:var(--daniel);color:var(--daniel);background:var(--daniel-dim);}
  .food-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;
  }
  .food-row:last-child{border-bottom:none;}
  .food-row .fname{flex:1;}
  .portion-btns{display:flex;gap:6px;}
  .portion-btn{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--card-2);
    color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Oswald',sans-serif;
  }
  .portion-btn:active{background:var(--daniel-dim);border-color:var(--daniel);color:var(--daniel);}

  .other-form{display:flex;flex-direction:column;gap:10px;padding-top:6px;}
  .custom-note{font-size:11px;color:var(--text-faint);line-height:1.5;}
  .add-btn{
    padding:10px;border-radius:10px;border:1px solid var(--daniel);background:var(--daniel-dim);
    color:var(--daniel);font-size:13px;font-weight:600;cursor:pointer;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;
  }

  .log-list{margin-top:14px;}
  .log-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;
  }
  .log-item:last-child{border-bottom:none;}
  .log-item .lname{flex:1;}
  .log-item .lmeta{color:var(--text-faint);font-size:11px;}
  .remove-btn{
    width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--card-2);
    color:var(--text-faint);font-size:13px;cursor:pointer;line-height:1;flex-shrink:0;
  }

  .totals-box{
    display:flex;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  }
  .totals-col{flex:1;text-align:center;}
  .totals-col .num{font-family:'Oswald',sans-serif;font-size:20px;color:var(--daniel);}
  .totals-col .lbl{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;}

  .suggestion-box{
    margin-top:12px;padding:12px;border-radius:10px;background:var(--daniel-dim);
    border:1px solid var(--daniel);font-size:13px;color:var(--text);line-height:1.5;
  }
  .suggestion-box.met{background:rgba(111,191,115,0.1);border-color:var(--good);}
  .suggestion-label{font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--daniel);margin-bottom:4px;}
  .suggestion-box.met .suggestion-label{color:var(--good);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Daily check-in</h1>
    <p>Track training, meals, and weight — one entry a day</p>
  </header>

  <div class="tabs">
    <div class="tab daniel" id="tab-daniel" onclick="switchPerson('daniel')">
      <div class="name">Daniel</div>
      <div class="role">Bulking</div>
    </div>
    <div class="tab ire" id="tab-ire" onclick="switchPerson('ire')">
      <div class="name">Ire</div>
      <div class="role">Cutting</div>
    </div>
  </div>

  <div class="accent-bar" id="accentBar"></div>

  <div class="card">
    <h2>Today</h2>
    <label class="field-label">Date</label>
    <input type="date" id="dateInput">
  </div>

  <div class="card" id="workoutCard">
    <h2>Workout</h2>
    <div class="day-label" id="dayLabel"></div>
    <div class="day-sub" id="daySub"></div>
    <div id="exerciseList"></div>
  </div>

  <div class="card" id="mealCard">
    <h2>Meals</h2>
    <div id="mealList"></div>
    <div class="meal-note" id="mealNote"></div>
  </div>

  <div class="card">
    <h2>Bodyweight and notes</h2>
    <div class="grid2">
      <div>
        <label class="field-label">Weight (kg)</label>
        <input type="number" step="0.1" id="weightInput" placeholder="e.g. 62.3">
      </div>
      <div>
        <label class="field-label">Energy today</label>
        <input type="number" min="1" max="5" id="energyInput" placeholder="1-5">
      </div>
    </div>
    <label class="field-label" style="margin-top:12px;">Notes</label>
    <textarea id="notesInput" placeholder="How training felt, cravings, soreness, anything worth logging"></textarea>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveCheckIn()">Save check-in</button>
  <div class="status-msg" id="statusMsg"></div>

  <div class="card" style="margin-top:24px;">
    <h2>Weight trend</h2>
    <canvas id="weightChart"></canvas>
    <div class="empty-state" id="chartEmpty" style="display:none;">No weight entries yet. Log a check-in to start the trend.</div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div id="historyTable"></div>
  </div>
</div>

<script>
let currentPerson = 'daniel';
let allEntries = { daniel: {}, ire: {} };
let dailyFoodLog = [];
let activeFoodTab = 'staples';

/* ---------------- Workout data ---------------- */

/* ---------------- Ire meal data (reference, grouped) ---------------- */

  { name: 'Beef or oxtail', weight: '120g raw', group: 'Dinner' },
  { name: 'Pounded yam flour', weight: '40g dry', group: 'Dinner' },
  { name: 'Ogbono', weight: '20g dry', group: 'Dinner' },
  { name: 'Onions, peppers, tomato (base)', weight: '30g each', group: 'Dinner', groupTotal: '~480-530 kcal, ~30g protein' },
  { name: 'Granola', weight: '20g', group: 'Snack (optional, if under target)', groupTotal: '~90 kcal' }
];

/* ---------------- Daniel food database ---------------- */
/* Values are estimates for typical Nigerian portions/preparations. */

const foodDB = {
  staples: [
    { id: 'garri', name: 'Garri (soaked)', medKcal: 360, medProtein: 1 },
    { id: 'ricestew', name: 'Rice and stew', medKcal: 525, medProtein: 13 },

  ],

  ],
  protein: [

    { id: 'chicken_boiled', name: 'Chicken (boiled)', medKcal: 180, medProtein: 29 },
    { id: 'beef', name: 'Beef', medKcal: 250, medProtein: 26 },
    { id: 'fish', name: 'Fish (e.g. titus/mackerel, fried)', medKcal: 220, medProtein: 24 },
    { id: 'turkey', name: 'Turkey', medKcal: 200, medProtein: 29 }
  ],
  other: [
    { id: 'semo', name: 'Semo (cooked)', kcal100: 110, protein100: 1 },
    { id: 'vegsoup', name: 'Vegetable soup (efo riro)', kcal100: 150, protein100: 6 },
    { id: 'moinmoin', name: 'Moin moin', kcal100: 180, protein100: 10 },
    { id: 'akara', name: 'Akara', kcal100: 300, protein100: 12 },
    { id: 'plantain_fried', name: 'Plantain (fried)', kcal100: 250, protein100: 2 },
    { id: 'plantain_boiled', name: 'Plantain (boiled)', kcal100: 120, protein100: 1 },
    { id: 'amala', name: 'Amala', kcal100: 110, protein100: 1 },
    { id: 'fufu', name: 'Fufu', kcal100: 110, protein100: 1 },
    { id: 'egusi', name: 'Egusi soup', kcal100: 200, protein100: 9 },

};

const PORTION_MULT = { S: 0.65, M: 1, L: 1.5 };
const PORTION_LABEL = { S: 'S', M: 'M', L: 'L' };

const DANIEL_KCAL_TARGET = 2900;
const DANIEL_PROTEIN_TARGET = 130;

/* ---------------- Helpers ---------------- */

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function switchPerson(person){
  currentPerson = person;
  document.getElementById('tab-daniel').classList.toggle('active', person==='daniel');
  document.getElementById('tab-ire').classList.toggle('active', person==='ire');
  document.getElementById('accentBar').className = 'accent-bar ' + person;
  document.getElementById('saveBtn').className = 'save-btn ' + person;
  render();
}

function getDateKey(){
  return document.getElementById('dateInput').value || todayStr();
}

function buildExerciseHTML(list, savedChecks){
  return list.map((ex, i) => {
    const on = savedChecks && savedChecks[i];
    return `<div class="row">
      <div class="check ${on?'on':''}" data-idx="${i}" onclick="toggleExercise(${i})"></div>
      <div class="item-text">${ex}</div>
    </div>`;
  }).join('');
}

function buildIreMealHTML(list, savedChecks){
  let lastGroup = null;
  return list.map((m, i) => {
    const on = savedChecks && savedChecks[i];
    let header = '';
    if(m.group && m.group !== lastGroup){
      lastGroup = m.group;
      header = `<div class="meal-group-label">${m.group}</div>`;
    }
    const totalLine = m.groupTotal ? `<div class="meal-group-total">${m.groupTotal}</div>` : '';
    return `${header}<div class="row">
      <div class="check ${on?'on':''}" data-mealidx="${i}" onclick="toggleMeal(${i})"></div>
      <div class="item-text">${m.name}</div>
      ${m.weight ? `<div class="meta">${m.weight}</div>` : ''}
    </div>${totalLine}`;
  }).join('');
}

let exerciseChecks = [];
let mealChecks = [];

function toggleExercise(i){
  exerciseChecks[i] = !exerciseChecks[i];
  document.querySelector(`[data-idx="${i}"]`).classList.toggle('on');
}
function toggleMeal(i){
  mealChecks[i] = !mealChecks[i];
  document.querySelector(`[data-mealidx="${i}"]`).classList.toggle('on');
}

/* ---------------- Daniel meal tracker ---------------- */

function renderDanielMealCard(){
  const html = `
    <div class="food-tabs" id="foodTabs"></div>
    <div id="foodList"></div>
    <div class="log-list" id="logList"></div>
    <div class="totals-box" id="totalsBox"></div>
    <div id="suggestionBox"></div>
  `;
  document.getElementById('mealList').innerHTML = html;
  document.getElementById('mealNote').textContent = 'Target: ~2800-3000 kcal, ~130g protein. Log what you actually eat — the app tracks the running total and suggests what to add.';
  renderFoodTabs();
  renderFoodList();
  renderLog();
}

function renderFoodTabs(){
  const tabs = [
    {id:'staples', label:'Staples'},
    {id:'occasionals', label:'Occasionals'},
    {id:'protein', label:'Protein sides'},
    {id:'other', label:'Other'}
  ];
  document.getElementById('foodTabs').innerHTML = tabs.map(t =>
    `<div class="food-tab ${activeFoodTab===t.id?'active':''}" onclick="setFoodTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function setFoodTab(tab){
  activeFoodTab = tab;
  renderFoodTabs();
  renderFoodList();
}

function renderFoodList(){
  const container = document.getElementById('foodList');
  if(activeFoodTab === 'other'){
    const options = foodDB.other.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
    container.innerHTML = `
      <div class="other-form">
        <div>
          <label class="field-label">Food</label>
          <select id="otherSelect" onchange="toggleCustomFields()">
            ${options}
            <option value="__custom__">Other (not listed) — enter my own</option>
          </select>
        </div>
        <div id="customNameWrap" style="display:none;">
          <label class="field-label">Food name</label>
          <input type="text" id="customName" placeholder="e.g. Semo and vegetable">
        </div>
        <div class="grid2" id="customKcalWrap" style="display:none;">
          <div>
            <label class="field-label">Kcal per 100g</label>
            <input type="number" id="customKcal" placeholder="e.g. 150">
          </div>
          <div>
            <label class="field-label">Protein per 100g</label>
            <input type="number" id="customProtein" placeholder="e.g. 6">
          </div>
        </div>
        <div class="custom-note" id="customNote">Rough reference: soups/stews ~150-250 kcal &amp; 6-12g protein per 100g. Swallow/starch (semo, fufu, amala) ~100-120 kcal &amp; 1-2g protein per 100g. Fried snacks ~250-300 kcal per 100g.</div>
        <div>
          <label class="field-label">Grams eaten</label>
          <input type="number" id="otherGrams" placeholder="e.g. 250">
        </div>
        <div class="add-btn" onclick="addOtherFood()">Add to today's log</div>
      </div>
    `;
    return;
  }

  const list = foodDB[activeFoodTab];
  container.innerHTML = list.map(f => `
    <div class="food-row">
      <div class="fname">${f.name}</div>
      <div class="portion-btns">
        <div class="portion-btn" onclick="addPortionFood('${activeFoodTab}','${f.id}','S')">S</div>
        <div class="portion-btn" onclick="addPortionFood('${activeFoodTab}','${f.id}','M')">M</div>
        <div class="portion-btn" onclick="addPortionFood('${activeFoodTab}','${f.id}','L')">L</div>
      </div>
    </div>
  `).join('');
}

function toggleCustomFields(){
  const val = document.getElementById('otherSelect').value;
  const isCustom = val === '__custom__';
  document.getElementById('customNameWrap').style.display = isCustom ? 'block' : 'none';
  document.getElementById('customKcalWrap').style.display = isCustom ? 'grid' : 'none';
}

function addPortionFood(tab, id, size){
  const food = foodDB[tab].find(f => f.id === id);
  if(!food) return;
  const mult = PORTION_MULT[size];
  const kcal = Math.round(food.medKcal * mult);
  const protein = Math.round(food.medProtein * mult * 10) / 10;
  dailyFoodLog.push({
    name: `${food.name} (${PORTION_LABEL[size]})`,
    kcal, protein
  });
  renderLog();
}

function addOtherFood(){
  const val = document.getElementById('otherSelect').value;
  const grams = parseFloat(document.getElementById('otherGrams').value);
  if(!grams || grams <= 0){ return; }

  let name, kcal100, protein100;
  if(val === '__custom__'){
    name = document.getElementById('customName').value.trim();
    kcal100 = parseFloat(document.getElementById('customKcal').value);
    protein100 = parseFloat(document.getElementById('customProtein').value);
    if(!name || isNaN(kcal100) || isNaN(protein100)) return;
  } else {
    const food = foodDB.other.find(f => f.id === val);
    if(!food) return;
    name = food.name;
    kcal100 = food.kcal100;
    protein100 = food.protein100;
  }

  const kcal = Math.round((kcal100/100) * grams);
  const protein = Math.round((protein100/100) * grams * 10) / 10;
  dailyFoodLog.push({ name: `${name} (${grams}g)`, kcal, protein });

  document.getElementById('otherGrams').value = '';
  renderLog();
}

function removeFoodLog(i){
  dailyFoodLog.splice(i,1);
  renderLog();
}

function renderLog(){
  const listEl = document.getElementById('logList');
  if(!listEl) return;
  if(dailyFoodLog.length === 0){
    listEl.innerHTML = '<div class="empty-state">Nothing logged yet today.</div>';
  } else {
    listEl.innerHTML = dailyFoodLog.map((item, i) => `
      <div class="log-item">
        <div class="lname">${item.name}</div>
        <div class="lmeta">${item.kcal} kcal · ${item.protein}g protein</div>
        <div class="remove-btn" onclick="removeFoodLog(${i})">×</div>
      </div>
    `).join('');
  }

  const totalKcal = dailyFoodLog.reduce((s,i)=>s+i.kcal,0);
  const totalProtein = Math.round(dailyFoodLog.reduce((s,i)=>s+i.protein,0) * 10) / 10;

  document.getElementById('totalsBox').innerHTML = `
    <div class="totals-col"><div class="num">${totalKcal}</div><div class="lbl">Kcal so far</div></div>
    <div class="totals-col"><div class="num">${totalProtein}g</div><div class="lbl">Protein so far</div></div>
    <div class="totals-col"><div class="num">${Math.max(DANIEL_KCAL_TARGET-totalKcal,0)}</div><div class="lbl">Kcal remaining</div></div>
  `;

  renderSuggestion(totalKcal, totalProtein);
}

function renderSuggestion(consumedKcal, consumedProtein){
  const remKcal = DANIEL_KCAL_TARGET - consumedKcal;
  const remProtein = DANIEL_PROTEIN_TARGET - consumedProtein;
  const box = document.getElementById('suggestionBox');
  if(!box) return;

  if(remKcal <= 50 && remProtein <= 5){
    box.innerHTML = `<div class="suggestion-box met"><div class="suggestion-label">Today's targets</div>Kcal and protein targets are met — nice work.</div>`;
    return;
  }

  const pool = [
    { name: 'Rice and stew (medium)', kcal: 525, protein: 13 },
    { name: 'Beans (medium)', kcal: 230, protein: 15 },
    { name: 'Boiled egg x2', kcal: 156, protein: 12 },
    { name: 'Grilled/boiled chicken (medium)', kcal: 205, protein: 28 },
    { name: 'Garri (medium)', kcal: 360, protein: 1 },
    { name: 'Bread (medium)', kcal: 160, protein: 6 },
    { name: 'Suya (100g)', kcal: 250, protein: 28 }
  ];

  const proteinUrgent = remProtein > 0 && (remProtein / Math.max(remKcal,1)) > 0.035;
  let sorted = proteinUrgent
    ? [...pool].sort((a,b)=> (b.protein/b.kcal) - (a.protein/a.kcal))
    : [...pool].sort((a,b)=> Math.abs(a.kcal-remKcal) - Math.abs(b.kcal-remKcal));

  const first = sorted[0];
  let text;
  if(remKcal - first.kcal > 250 || remProtein - first.protein > 8){
    const rem2Kcal = remKcal - first.kcal;
    const rem2Protein = remProtein - first.protein;
    const secondPool = pool.filter(p => p.name !== first.name);
    const second = rem2Protein > 8
      ? secondPool.sort((a,b)=>(b.protein/b.kcal)-(a.protein/a.kcal))[0]
      : secondPool.sort((a,b)=>Math.abs(a.kcal-rem2Kcal)-Math.abs(b.kcal-rem2Kcal))[0];
    text = `Try: <strong>${first.name}</strong> + <strong>${second.name}</strong> — closes roughly ${first.kcal+second.kcal} kcal / ${Math.round((first.protein+second.protein)*10)/10}g protein of what's left.`;
  } else {
    text = `Try: <strong>${first.name}</strong> — closes roughly ${first.kcal} kcal / ${first.protein}g protein of what's left.`;
  }

  box.innerHTML = `<div class="suggestion-box"><div class="suggestion-label">Still needed today</div>${remKcal>0?remKcal+' kcal':'0 kcal'} · ${remProtein>0?remProtein+'g protein':'0g protein'} remaining<br><br>${text}</div>`;
}

/* ---------------- Main render ---------------- */

function render(){
  const key = getDateKey();
  const existing = allEntries[currentPerson][key] || null;

  if(currentPerson === 'daniel'){
    const dow = new Date(key + 'T12:00:00').getDay();
    const plan = danielWorkouts[dow];
    document.getElementById('dayLabel').textContent = plan.label;
    document.getElementById('daySub').textContent = plan.sub;
    exerciseChecks = existing ? (existing.exercises || plan.exercises.map(()=>false)) : plan.exercises.map(()=>false);
    document.getElementById('exerciseList').innerHTML = plan.exercises.length
      ? buildExerciseHTML(plan.exercises, exerciseChecks)
      : '<div class="empty-state">Total rest — no training scheduled.</div>';

    dailyFoodLog = existing && existing.foodLog ? JSON.parse(JSON.stringify(existing.foodLog)) : [];
    activeFoodTab = 'staples';
    renderDanielMealCard();
  } else {
    document.getElementById('dayLabel').textContent = 'Vertical jump programme';
    document.getElementById('daySub').textContent = 'Fixed daily routine';
    exerciseChecks = existing ? (existing.exercises || ireExercises.map(()=>false)) : ireExercises.map(()=>false);
    document.getElementById('exerciseList').innerHTML = buildExerciseHTML(ireExercises, exerciseChecks);

    mealChecks = existing ? (existing.meals || ireMeals.map(()=>false)) : ireMeals.map(()=>false);
    document.getElementById('mealList').innerHTML = buildIreMealHTML(ireMeals, mealChecks);
    document.getElementById('mealNote').textContent = 'Target: ~1600 kcal, ~170-180g protein. Weights shown are raw/dry unless noted.';
  }

  document.getElementById('weightInput').value = existing ? (existing.weight ?? '') : '';
  document.getElementById('energyInput').value = existing ? (existing.energy ?? '') : '';
  document.getElementById('notesInput').value = existing ? (existing.notes ?? '') : '';

  renderHistory();
  renderChart();
}

async function loadEntries(person){
  try{
    const res = await fetch('/api/checkins?person=' + person);
    if(!res.ok) return {};
    return await res.json();
  }catch(e){
    return {};
  }
}

async function saveCheckIn(){
  const key = getDateKey();
  const entry = {
    date: key,
    weight: document.getElementById('weightInput').value ? parseFloat(document.getElementById('weightInput').value) : null,
    energy: document.getElementById('energyInput').value ? parseInt(document.getElementById('energyInput').value) : null,
    notes: document.getElementById('notesInput').value,
    exercises: exerciseChecks
  };
  if(currentPerson === 'daniel'){
    entry.foodLog = dailyFoodLog;
  } else {
    entry.meals = mealChecks;
  }
  try{
    const res = await fetch('/api/checkins', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ person: currentPerson, date: key, entry })
    });
    if(!res.ok) throw new Error('save failed');
    allEntries[currentPerson][key] = entry;
    const msg = document.getElementById('statusMsg');
    msg.textContent = 'Saved';
    setTimeout(()=>{ msg.textContent=''; }, 2000);
    renderHistory();
    renderChart();
  }catch(e){
    document.getElementById('statusMsg').textContent = 'Could not save — try again';
  }
}

function pct(arr){
  if(!arr || arr.length===0) return 0;
  const done = arr.filter(Boolean).length;
  return Math.round((done/arr.length)*100);
}

function renderHistory(){
  const entries = Object.values(allEntries[currentPerson]).sort((a,b)=> b.date.localeCompare(a.date));
  const container = document.getElementById('historyTable');
  if(entries.length===0){
    container.innerHTML = '<div class="empty-state">No check-ins yet.</div>';
    return;
  }
  let rows = entries.slice(0,14).map(e => {
    const wPct = pct(e.exercises);
    let secondCol;
    if(currentPerson === 'daniel'){
      const kcal = e.foodLog ? e.foodLog.reduce((s,i)=>s+i.kcal,0) : 0;
      secondCol = `${kcal} kcal`;
    } else {
      secondCol = pct(e.meals) + '%';
    }
    return `<tr>
      <td>${e.date}</td>
      <td>${e.weight ? e.weight + ' kg' : '—'}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill ${currentPerson}" style="width:${wPct}%"></div></div>
          <div class="progress-pct">${wPct}%</div>
        </div>
      </td>
      <td>${secondCol}</td>
    </tr>`;
  }).join('');
  const secondHeader = currentPerson === 'daniel' ? 'Kcal logged' : 'Meals';
  container.innerHTML = `<table>
    <tr><th>Date</th><th>Weight</th><th>Workout</th><th>${secondHeader}</th></tr>
    ${rows}
  </table>`;
}

function renderChart(){
  const canvas = document.getElementById('weightChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = 120;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  const entries = Object.values(allEntries[currentPerson])
    .filter(e => e.weight != null)
    .sort((a,b)=> a.date.localeCompare(b.date));

  document.getElementById('chartEmpty').style.display = entries.length < 2 ? 'block' : 'none';
  if(entries.length < 2) return;

  const weights = entries.map(e=>e.weight);
  const min = Math.min(...weights) - 0.5;
  const max = Math.max(...weights) + 0.5;
  const pad = 10;

  const color = currentPerson === 'daniel' ? '#E8A33D' : '#33B7A6';

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  entries.forEach((e,i)=>{
    const x = pad + (i/(entries.length-1)) * (w - pad*2);
    const y = h - pad - ((e.weight - min)/(max-min)) * (h - pad*2);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  ctx.fillStyle = color;
  entries.forEach((e,i)=>{
    const x = pad + (i/(entries.length-1)) * (w - pad*2);
    const y = h - pad - ((e.weight - min)/(max-min)) * (h - pad*2);
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });
}

document.getElementById('dateInput').addEventListener('change', render);

async function init(){
  document.getElementById('dateInput').value = todayStr();
  allEntries.daniel = await loadEntries('daniel');
  allEntries.ire = await loadEntries('ire');
  switchPerson('daniel');
}
init();
</script>
